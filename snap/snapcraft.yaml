name: lemonade-server
base: core24
summary: Local AI server with OpenAI-compatible API
title: Lemonade Server
description: |
  Lemonade Server is a lightweight, high-performance local AI inference server
  that provides an OpenAI-compatible API for running large language models on
  your own hardware.

  **Features:**
  - OpenAI-compatible REST API (chat completions, embeddings, etc.)
  - Multiple backend support: Vulkan, ROCm (AMD GPUs), and CPU
  - Automatic model management and caching
  - Support for GGUF models from Hugging Face
  - Low latency local inference
  - Runs as a background service

  **Supported Hardware:**
  - AMD GPUs: RDNA3 (RX 7000), RDNA4 (RX 9000), Strix Point/Halo APUs
  - Any Vulkan-capable GPU
  - CPU fallback for systems without GPU acceleration

  **Quick Start:**
  The server starts automatically after installation. Access the API at:
  http://localhost:8000/api/v1

  **ROCm Support (AMD GPUs):**
  For ROCm GPU acceleration, connect the process-control interface:
  sudo snap connect lemonade-server:process-control

  For status/metrics reporting, lemonade-server.metrics requires:
  sudo snap connect lemonade-server:system-observe

  **Documentation:** https://lemonade-server.ai/

adopt-info: lemonade-server
grade: stable
confinement: strict
license: Apache-2.0

website: https://lemonade-server.ai
source-code: https://github.com/lemonade-sdk/lemonade
issues: https://github.com/kenvandine/lemonade-server-snap/issues
contact: https://github.com/kenvandine/lemonade-server-snap/issues

platforms:
  amd64:

layout:
  /usr/share/lemonade-server:
    symlink: $SNAP/usr/share/lemonade-server
  # Node.js externalizes some builtins to /usr/share/nodejs at a hardcoded path.
  # Bind the snap's copy so node can find them at runtime.
  /usr/share/nodejs:
    bind: $SNAP/usr/share/nodejs
  # Add layout entries so XRT's hardcoded absolute paths resolve to the snap's copies
  /usr/lib/x86_64-linux-gnu/libxrt_core.so.2:
    bind-file: $SNAP/usr/lib/x86_64-linux-gnu/libxrt_core.so.2.21.75
  /usr/lib/x86_64-linux-gnu/libxrt_coreutil.so.2:
    bind-file: $SNAP/usr/lib/x86_64-linux-gnu/libxrt_coreutil.so.2.21.75
  /usr/lib/x86_64-linux-gnu/libxrt_driver_xdna.so.2:
    bind-file: $SNAP/usr/lib/x86_64-linux-gnu/libxrt_driver_xdna.so.2.21.75
      
plugs:
  gpu-2404:
    interface: content
    target: $SNAP/gpu-2404
    default-provider: mesa-2404
slots:
  # Adds a pseudo content interface to allow clients to express their
  # runtime dependency on lemonade-server
  lemonade-server:
    interface: content
    content: foo
    read:
      - $SNAP/meta/snap.yaml

apps:
  metrics:
    command: bin/metrics
    command-chain: [bin/gpu-2404-wrapper]
    plugs:
      - accel
      - home
      - removable-media
      - network
      - network-bind
      - opengl
      - gpu-2404
      - process-control
      - hardware-observe
      - system-observe
  lemonade-server:
    command: usr/bin/lemonade-server
    command-chain: [bin/gpu-2404-wrapper]
    plugs:
      - accel
      - home
      - removable-media
      - network
      - network-bind
      - opengl
      - gpu-2404
      - hardware-observe
      - system-observe
    environment:
      LD_LIBRARY_PATH: "$SNAP/usr/share/lemonade-server:$SNAP_COMMON/cache/lemonade/bin/llamacpp/vulkan:$SNAP_COMMON/cache/lemonade/bin/whispercpp/vulkan:$SNAP/usr/lib/x86_64-linux-gnu:$SNAP/lib/x86_64-linux-gnu:/var/lib/snapd/lib/gl${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
      PATH: "$SNAP/usr/bin:$SNAP_USER_COMMON/tools/bin:$PATH"
      HOME: "$SNAP_COMMON"
      LEMONADE_CACHE_DIR: "$SNAP_COMMON/cache/lemonade"
      FLM_MODEL_PATH: $SNAP_COMMON/flm/models
      FLM_CONFIG_PATH: $SNAP/usr/share/flm/model_list.json
      FLM_XCLBIN_PATH: $SNAP/usr/share/flm/xclbins
      LEMONADE_FLM_LINUX_BETA: 1
  daemon:
    command: bin/lemonade-server-wrapper serve
    command-chain: [bin/gpu-2404-wrapper]
    daemon: simple
    install-mode: enable
    restart-condition: on-failure
    refresh-mode: restart
    plugs:
      - accel
      - home
      - removable-media
      - network
      - network-bind
      - opengl
      - gpu-2404
      - process-control
      - hardware-observe
      - system-observe
    environment:
      LD_LIBRARY_PATH: "$SNAP/usr/share/lemonade-server:$SNAP_COMMON/cache/lemonade/bin/llamacpp/vulka    n:$SNAP_COMMON/cache/lemonade/bin/whispercpp/vulkan:$SNAP/usr/lib/x86_64-linux-gnu:$SNAP/lib/x86_64-linux-gnu:/var/lib/snapd/lib/gl${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
      PATH: "$SNAP/usr/bin:$PATH"
      HOME: "$SNAP_COMMON"
      LEMONADE_CACHE_DIR: "$SNAP_COMMON/cache/lemonade"
      LEMONADE_DISABLE_SYSTEMD_JOURNAL: 1
      FLM_MODEL_PATH: $SNAP_COMMON/flm/models
      FLM_CONFIG_PATH: $SNAP/usr/share/flm/model_list.json
      FLM_XCLBIN_PATH: $SNAP/usr/share/flm/xclbins
      LEMONADE_FLM_LINUX_BETA: 1
  flm:
    command: usr/bin/flm
    command-chain: [bin/gpu-2404-wrapper]
    plugs:
      - accel
      - home
      - removable-media
      - network
      - network-bind
      - opengl
      - process-control
      - hardware-observe
      - system-observe
    environment:
      LD_LIBRARY_PATH: "$SNAP/usr/share/lemonade-server:$SNAP/usr/lib/llamacpp/vulkan:$SNAP/usr/lib/x86_64-linux-gnu:$SNAP/lib/x86_64-linux-gnu:/var/lib/snapd/lib/gl${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
      PATH: "$SNAP/usr/bin:$PATH"
      HOME: "$SNAP_COMMON"
      LEMONADE_CACHE_DIR: "$SNAP_COMMON/cache/lemonade"
      FLM_MODEL_PATH: $SNAP_COMMON/flm/models
      FLM_CONFIG_PATH: $SNAP/usr/share/flm/model_list.json
      FLM_XCLBIN_PATH: $SNAP/usr/share/flm/xclbins

parts:
  deps:
    plugin: nil
    build-packages:
      - curl
    stage-packages:
      - libgomp1
      - libatomic1
      - libcurl4t64
      - curl # for metrics
      - nodejs # for running @anthropic-ai/claude-code cli.js when auto-downloaded
      - node-cjs-module-lexer # nodejs externalized builtin
      - node-undici # nodejs externalized builtin
      - node-acorn # nodejs externalized builtins (acorn + acorn-walk)
      - unzip # For extracting backends at runtime
      - libdrm-amdgpu1 # SD backends need this at runtime
      - libnuma1 # SD backends need this at runtime
    override-build: |
      set +u # For unbound variables
      # workaround for build.snapcraft.io builds
      # https://bugs.launchpad.net/bugs/1886861
      if [ -n "$http_proxy" ]; then
        export ELECTRON_GET_USE_PROXY=1
        export GLOBAL_AGENT_HTTP_PROXY="${http_proxy}"
        export GLOBAL_AGENT_HTTPS_PROXY="${http_proxy}"
      fi
      craftctl default

  lemonade-server:
    plugin: cmake
    source: https://github.com/lemonade-sdk/lemonade.git
    source-tag: v10.0.0
    cmake-parameters:
      - -DCMAKE_PREFIX_PATH=/usr
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DBUILD_WEB_APP=ON
    build-snaps:
      - node/22/stable
    build-packages:
      - build-essential
      - g++
      - cmake
      - git
      - curl
      - libcurl4-openssl-dev
      - libssl-dev
      - zlib1g-dev
      - pkg-config
      - ninja-build
    override-pull: |
      craftctl default
      VERSION=$(craftctl get version)
      if [ -z $VERSION ]; then
        VERSION=$(git describe --tags --abbrev=10)
        craftctl set version=$VERSION
      fi
      for patch in $CRAFT_PROJECT_DIR/snap/local/patches/*.patch; do
        patch -p1 --forward --reject-file=- < "$patch" || true
      done
    override-build: |
      craftctl default

  gpu-snap:
    after: [lemonade-server, deps]
    source: https://github.com/canonical/gpu-snap.git
    plugin: dump
    override-prime: |
      craftctl default
      ${CRAFT_PART_SRC}/bin/gpu-2404-cleanup mesa-2404
    prime:
      - bin/gpu-2404-wrapper
  
  xrt:
    plugin: cmake
    source: https://github.com/kenvandine/XRT.git
    source-branch: scan_devices_nonfatal_2.21
    source-subdir: src
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DXRT_NPU=1
      - -DXRT_EXCLUDE_SUB_DIRECTORY=src/python\;src/runtime_src/xocl
      - -DDCMAKE_BUILD_RPATH_USE_ORIGIN=ON
    override-build: |
      export XRT_VERSION_PATCH=75
      craftctl default
    build-packages:
      - build-essential
      - cmake
      - git
      - pkg-config
      - libboost-dev
      - libboost-filesystem-dev
      - libboost-program-options-dev
      - libdrm-dev
      - libncurses-dev
      - ocl-icd-opencl-dev
      - opencl-headers
      - rapidjson-dev
      - libssl-dev
      - uuid-dev
      - libdw-dev
      - libelf-dev
      - libsystemd-dev
      - ocl-icd-dev
      - systemtap-sdt-dev
    prime:
      - usr/lib/x86_64-linux-gnu/libxrt*.so*

  xdna-driver:
    after: [xrt]
    plugin: nil
    source: https://github.com/amd/xdna-driver.git
    source-tag: '2.21.75'
    build-packages:
      - build-essential
      - g++
      - cmake
      - git
      - pkg-config
      - libboost-dev
      - libboost-filesystem-dev
      - libboost-program-options-dev
      - libdrm-dev
      - libncurses-dev
      - ocl-icd-opencl-dev
      - opencl-headers
      - rapidjson-dev
      - libssl-dev
      - uuid-dev
      - libdw-dev
      - libelf-dev
      - libsystemd-dev
      - ocl-icd-dev
      - systemtap-sdt-dev
    override-pull: |
      craftctl default
      git submodule update --init xrt
      rm -rf xrt/src/python
    override-build: |
      export XRT_VERSION_PATCH=75
      cmake "$CRAFT_PART_SRC" \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DSKIP_KMOD=1
      cmake --build . -- -j$(nproc)
      DESTDIR="$CRAFT_PART_INSTALL" cmake --install .
    stage:
      - usr/lib/x86_64-linux-gnu/libxrt_driver_xdna*
    prime:
      - usr/lib/x86_64-linux-gnu/libxrt_driver_xdna*

  fastflowlm:
    after: [xrt]
    plugin: cmake
    source: https://github.com/FastFlowLM/FastFlowLM.git
    #source-tag: v0.9.35
    source-subdir: src
    build-packages:
      - build-essential
      - g++
      - cmake
      - git
      - curl
      - libcurl4-openssl-dev
      - libssl-dev
      - zlib1g-dev
      - pkg-config
      - ninja-build
      - libboost-program-options-dev
      - libboost-dev
      - libavcodec-dev
      - libavformat-dev
      - libavutil-dev
      - libdrm-dev
      - libfftw3-dev
      - libreadline-dev
      - libswresample-dev
      - libswscale-dev
      - uuid-dev
      - rustc-1.89
      - cargo-1.89
    stage-packages:
      - libaom3
      - libavcodec60
      - libavformat60
      - libavutil58
      - libbluray2
      - libboost-program-options1.83.0
      - libcairo-gobject2
      - libcairo2
      - libchromaprint1
      - libcjson1
      - libcodec2-1.2
      - libdatrie1
      - libdav1d7
      - libfftw3-single3
      - libfontconfig1
      - libfribidi0
      - libgdk-pixbuf-2.0-0
      - libgme0
      - libgraphite2-3
      - libgsm1
      - libharfbuzz0b
      - libhwy1t64
      - libjpeg-turbo8
      - libjxl0.7
      - liblcms2-2
      - libmbedcrypto7t64
      - libmp3lame0
      - libmpg123-0t64
      - libnorm1t64
      - libogg0
      - libopenjp2-7
      - libopenmpt0t64
      - libopus0
      - libpango-1.0-0
      - libpangocairo-1.0-0
      - libpangoft2-1.0-0
      - libpgm-5.3-0t64
      - libpixman-1-0
      - librabbitmq4
      - librav1e0
      - librist4
      - librsvg2-2
      - libsharpyuv0
      - libshine3
      - libsnappy1v5
      - libsodium23
      - libsoxr0
      - libspeex1
      - libsrt1.5-gnutls
      - libssh-gcrypt-4
      - libsvtav1enc1d1
      - libswresample4
      - libswscale7
      - libthai0
      - libtheora0
      - libtwolame0
      - libudfread0
      - libva-drm2
      - libva-x11-2
      - libva2
      - libvdpau1
      - libvorbis0a
      - libvorbisenc2
      - libvorbisfile3
      - libvpl2
      - libvpx9
      - libwebp7
      - libwebpmux3
      - libx11-6
      - libx11-xcb1
      - libx264-164
      - libx265-199
      - libxau6
      - libxcb-dri3-0
      - libxcb-render0
      - libxcb-shm0
      - libxcb1
      - libxdmcp6
      - libxext6
      - libxfixes3
      - libxrender1
      - libxvidcore4
      - libzmq5
      - libzvbi0t64
      - ocl-icd-libopencl1
    override-build: |
      export CARGO=/usr/bin/cargo-1.89
      export RUSTC=/usr/bin/rustc-1.89
      ln -sf /usr/bin/cargo-1.89 /usr/bin/cargo
      ln -sf /usr/bin/rustc-1.89 /usr/bin/rustc
      cd "$CRAFT_PART_SRC/src"
      cmake --preset linux-snap \
        -DCMAKE_PREFIX_PATH="$CRAFT_STAGE/usr:/usr" \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_XCLBIN_PREFIX=/usr/share/flm/xclbins \
        -DXRT_INCLUDE_DIR="$CRAFT_STAGE/usr/include/xrt" \
        -DXRT_LIB_DIR="$CRAFT_STAGE/usr/lib/x86_64-linux-gnu"
      cmake --build "$CRAFT_PART_BUILD" -- -j$(nproc)
      DESTDIR="$CRAFT_PART_INSTALL" cmake --install "$CRAFT_PART_BUILD"
    prime:
      - usr/lib/*.so
      - usr/lib/*/*.so.*
      - usr/bin
      - usr/share/flm

  scripts:
    plugin: dump
    source: scripts/
    organize:
      lemonade-server-wrapper: bin/lemonade-server-wrapper
      metrics: bin/metrics
      claude: usr/bin/claude
      codex: usr/bin/codex
    override-prime: |
      craftctl default
      chmod +x $CRAFT_PRIME/bin/lemonade-server-wrapper
      chmod +x $CRAFT_PRIME/bin/metrics
      chmod +x $CRAFT_PRIME/usr/bin/claude
      chmod +x $CRAFT_PRIME/usr/bin/codex

  tools:
    plugin: nil
    stage-packages:
      - gh
      - git
      - jq
      - make
      - patch
      - ripgrep
